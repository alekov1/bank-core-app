spring.application.name=bank-payment
spring.datasource.url=jdbc:postgresql://localhost:5433/bankdb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=payment_schema

send.kafka.topics=payments

server.port=8081

kafka.payment.prop.bootstrapServers=localhost:9092
kafka.payment.prop.retries=10
kafka.payment.prop.deliveryTimeout=120_000
kafka.payment.prop.requestTimeout=30_000
kafka.payment.prop.maxInFlightRequests=5

payment.prop.fixedDelayScheduled=5_000