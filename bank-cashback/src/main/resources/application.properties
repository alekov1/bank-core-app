spring.application.name=bank-cashback
server.port=8082
spring.datasource.url=jdbc:postgresql://localhost:5433/bankdb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=cashback_schema

kafka.cashback.prop.bootstrapServers=localhost:9092
kafka.cashback.prop.casgroupId=bank-cashback-payments
kafka.cashback.prop.intervalBackOff=5_000L
kafka.cashback.prop.maxAttemptsBackOff=3L
